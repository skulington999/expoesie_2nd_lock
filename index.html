<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CLICK</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    height: 100%;
    overflow: hidden;
    font-family: 'Press Start 2P', cursive;
    display: flex;
    align-items: center;
    justify-content: center;
}

#clickBtn {
    padding: 20px 40px;
    font-size: 16px;
    color: #00ffcc;
    background: black;
    border: 3px solid #00ffcc;
    cursor: pointer;
    box-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
    transition: all 0.2s ease;
}

#clickBtn:hover {
    transform: scale(1.1);
}

.fade-out {
    animation: fadeOut 0.3s forwards;
}

@keyframes fadeOut {
    to {
        opacity: 0;
        transform: scale(0.5);
    }
}

#message {
    position: absolute;
    font-size: 40px;
    text-align: center;
    display: none;
    animation: rainbow 1s infinite, pulse 1s infinite;
}

@keyframes rainbow {
    0% { color: red; }
    20% { color: orange; }
    40% { color: yellow; }
    60% { color: lime; }
    80% { color: cyan; }
    100% { color: magenta; }
}

@keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

.shake {
    animation: shake 0.4s;
}

@keyframes shake {
    0% { transform: translate(2px, 2px); }
    25% { transform: translate(-2px, -2px); }
    50% { transform: translate(2px, -2px); }
    75% { transform: translate(-2px, 2px); }
    100% { transform: translate(0,0); }
}
</style>
</head>

<body>

<button id="clickBtn">CLICK</button>
<div id="message">CONGRATULATIONS!</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const btn = document.getElementById("clickBtn");
const message = document.getElementById("message");

// ⚠️ Le fichier doit être dans le même repo que ton index.html
const audio = new Audio("silent hill sfx.wav");

// 🔗 lien final
const redirectURL = "https://untitled.stream/library/project/HblZE61SGSyDlyiGmc5tv";

btn.addEventListener("click", () => {

    btn.classList.add("fade-out");
    document.body.classList.add("shake");

    setTimeout(() => {
        btn.style.display = "none";
    }, 300);

    confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
    });

    message.style.display = "block";

    // 🔊 jouer le son
    audio.play();

    // 🔁 redirection à la FIN du son
    audio.onended = () => {
        window.location.href = redirectURL;
    };

});

</script>

</body>
</html>
